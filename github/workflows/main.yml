name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Gradle
        run: sudo apt-get update && sudo apt-get install -y gradle

      - name: Build
        run: gradle build

      - uses: actions/upload-artifact@v4
        with:
          name: symbol-jar
          path: build/libs/*.jar
